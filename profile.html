 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Profile | NIKA Talent Solutions</title>

<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/profile.css">

</head>

<body>

<div class="container">

<h1>Complete Your Profile 👋</h1>

<p>Please complete your details before uploading your resume.</p>

<form id="profileForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email (Optional)">

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="number"
id="age"
placeholder="Age">

<input
type="text"
id="city"
placeholder="City">

<select id="qualification">

<option value="">Highest Qualification</option>

<option>10th</option>

<option>12th</option>

<option>ITI</option>

<option>Diploma</option>

<option>B.A</option>

<option>B.Com</option>

<option>B.Sc</option>

<option>BBA</option>

<option>BCA</option>

<option>B.Tech</option>

<option>MBA</option>

<option>Other</option>

</select>

<select id="experience">

<option value="">Experience</option>

<option>Fresher</option>

<option>0-1 Year</option>

<option>1-2 Years</option>

<option>2-5 Years</option>

<option>5+ Years</option>

</select>

<input
type="number"
id="expectedSalary"
placeholder="Expected Salary">

<button type="submit">

Continue →

</button>

</form>

</div>

<script type="module" src="assets/js/profile.js"></script>

</body>

</html>
